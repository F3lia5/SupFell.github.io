<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ana Sayfa</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="app-body">
    <div class="app-layout">
      <!-- Sadece admin girişinde JS tarafından görünür yapılır -->
      <aside id="sidebar" class="sidebar" hidden>
        <h2 class="sidebar-title">Kullanıcılar</h2>
        <ul id="user-list" class="user-list"></ul>
      </aside>

      <section class="chat-panel">
        <header class="chat-header">
          <div>
            <h1 id="chat-title">Sohbet</h1>
            <p id="welcome-text" class="chat-subtitle">Hoş geldin</p>
          </div>
          <button id="logout-button" class="btn-secondary">Çıkış Yap</button>
        </header>

        <div id="chat-messages" class="chat-messages">
          <p class="empty-state">Henüz mesaj bulunmuyor.</p>
        </div>

        <div class="chat-input-area">
          <input
            type="text"
            id="message-input"
            class="chat-input"
            placeholder="Mesajınızı yazın..."
          />
          <button id="send-button" class="btn-primary btn-send">Gönder</button>
        </div>
      </section>
    </div>

    <!-- Modüller yüklenme sırası önemlidir: veri -> oturum -> alt paneller -> sayfa mantığı -->
    <script src="js/users.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/message-service.js"></script>
    <script src="js/admin-panel.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
